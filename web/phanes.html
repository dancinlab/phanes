<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>phanes · 파네스</title>
  <style>
    :root { --bg:#0b0d12; --fg:#eaeef6; --muted:#7a8294; --accent:#f5b042;
            --line:#1e2330; }
    html,body { background:var(--bg); color:var(--fg);
                font:13px/1.55 ui-monospace,Menlo,Consolas,monospace; margin:0; }
    .wrap { max-width:820px; margin:48px auto; padding:0 24px; }
    h1 { font-weight:600; letter-spacing:-0.02em; margin:0 0 4px; font-size:22px; }
    .sub { color:var(--muted); margin:0 0 28px; font-size:13px; }
    .hero { display:block; width:100%; aspect-ratio:1672/941;
            border:1px solid var(--line); border-radius:6px;
            margin:0 0 24px; object-fit:cover; background:#11151e; }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>
<div class="wrap">
  <picture>
    <source srcset="/static/phanes.webp" type="image/webp">
    <img class="hero" src="/static/phanes.png" alt="phanes — lighthouse in fog">
  </picture>
  <h1>phanes · 파네스</h1>
  <p class="sub">seed → OUROBOROS <code>goal → falsifier → saturation</code>
    → verified discovery catalog.</p>
  <p><a href="/">→ developer console</a></p>
</div>
</body>
</html>
